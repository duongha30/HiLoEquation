services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

  client:
    build:
      context: ./hiloequation_client
    restart: unless-stopped

  server:
    build:
      context: ./hiloequation_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4056
      ALLOWED_ORIGIN: https://${DOMAIN}
      DB_PROD_HOST: mongo
      DB_PROD_PORT: 27017
      DB_PROD_NAME: mongoHilo_prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # No published ports — reachable only on the internal network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  mongo_data:
  redis_data:
